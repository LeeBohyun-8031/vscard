<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이보현 웹명함 카드</title>

  <link rel="stylesheet" href="./style.css?v=13" />
  <script src="./script.js?v=13" defer></script>
</head>

<body>
  <main class="business-card" aria-label="이보현 웹명함 카드">
    <section class="profile">
      <div class="profile-image-wrap">
        <img
          id="profileImage"
          class="profile-image"
          src="./bear1.jpg"
          alt="이보현 프로필 이미지"
        />
      </div>

      <h1 class="name">이보현</h1>
      <p class="job">게임기획자</p>
      <p class="intro">
        콘텐츠의 규칙과 경험의 흐름을 연결해, 플레이가 자연스럽게 이어지는 구조를 설계하는 게임기획자를 지향합니다.
      </p>

      <section class="portfolio-quick" aria-label="대표 포트폴리오">
        <p class="portfolio-quick-title">대표 포트폴리오</p>

        <div class="portfolio-icon-list">
          <a
            class="portfolio-icon-link"
            href="https://drive.google.com/file/d/1_L-hzB5BupHPf4ZTb5eMBTZzoMloUy97/view?usp=sharing"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="마비노기 모바일 히든클래스 및 잠재력 시스템 제안서 보기"
            title="마비노기 모바일"
          >
            <span class="portfolio-icon">⚔</span>
            <span class="portfolio-icon-label">마비노기 모바일</span>
          </a>

          <a
            class="portfolio-icon-link"
            href="https://docs.google.com/presentation/d/1qIvNZo9bByDIVUCFYMdzahBxcWbpBUbB/edit?usp=sharing&ouid=115362181656546339885&rtpof=true&sd=true"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="트릭컬 리바이브 신규 시나리오 기획서 보기"
            title="트릭컬 리바이브"
          >
            <span class="portfolio-icon">✦</span>
            <span class="portfolio-icon-label">트릭컬 리바이브</span>
          </a>

          <a
            class="portfolio-icon-link"
            href="https://drive.google.com/file/d/1y9tGcifzaf8qhDLDcWhiWww5l2V-7vKH/view?usp=sharing"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="가디언테일즈 에스텔 왕국 빌런 시나리오 기획서 보기"
            title="가디언 테일즈"
          >
            <span class="portfolio-icon">☄</span>
            <span class="portfolio-icon-label">가디언 테일즈</span>
          </a>
        </div>
      </section>
    </section>

    <section class="info-list" aria-label="연락처 정보">
      <a class="info-item" href="mailto:dkwgsk@gmail.com">
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path
              d="M4 6.5h16v11H4v-11Z"
              stroke="currentColor"
              stroke-width="2"
              stroke-linejoin="round"
            />
            <path
              d="m4.5 7 7.5 6 7.5-6"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </span>

        <span class="info-text">
          <span class="label">Email</span>
          <span class="value">dkwgsk@gmail.com</span>
        </span>
      </a>

      <a
        class="info-item"
        href="tel:01055710831"
        data-save-contact
        aria-label="이보현 연락처 저장"
      >
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path
              d="M8.4 5.2 10 8.8c.3.7.1 1.5-.5 2l-1.1.9c1.1 2.2 2.8 3.9 5 5l.9-1.1c.5-.6 1.3-.8 2-.5l3.6 1.6c.7.3 1.1 1 .9 1.8l-.5 2.1c-.2.8-.9 1.4-1.7 1.4C9.5 22 2 14.5 2 5.4c0-.8.6-1.5 1.4-1.7l2.1-.5c.8-.2 1.5.2 1.8 1Z"
              stroke="currentColor"
              stroke-width="2"
              stroke-linejoin="round"
            />
          </svg>
        </span>

        <span class="info-text">
          <span class="label">Phone</span>
          <span class="value">010-5571-0831</span>
        </span>
      </a>
    </section>

    <section class="actions" aria-label="빠른 연결 버튼">
      <a class="button button-primary" href="mailto:dkwgsk@gmail.com">
        이메일 보내기
      </a>

      <a class="button button-secondary" href="tel:01055710831">
        전화 걸기
      </a>

      <a
        class="button button-secondary"
        href="https://drive.google.com/drive/folders/12plJdY0Ji16SZu5nslOCU7A6im8AcUFH?usp=sharing"
        target="_blank"
        rel="noopener noreferrer"
      >
        기획 포트폴리오 보기
      </a>

      <a
        class="button button-github"
        href="https://github.com/LeeBohyun-8031"
        target="_blank"
        rel="noopener noreferrer"
      >
        ⚙ Github 보기
      </a>
    </section>
  </main>
</body>
</html>
